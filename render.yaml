databases:
  - name: QuestBoardDB
    plan: free
    databaseName: QuestBoard
    user: caseyjonesadmin

services:
  - type: web
    plan: free
    name: QuestBoard
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn mysite.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: QuestBoardDB
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4